name: Publish to TER

on:
  push:
    tags:
      - '*.*.*'

jobs:
  publish:
    name: Publish new version to TER
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    env:
      TYPO3_EXTENSION_KEY: breadcrumb_labels_uid
      TYPO3_API_TOKEN: ${{ secrets.EXTENSIONS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: echo "number=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Verify TER token is available
        run: |
          if [ -z "${TYPO3_API_TOKEN}" ]; then
            echo "::error::Secret TYPO3_API_TOKEN is empty or not reaching the job. Add it under Settings → Secrets and variables → Actions → tab 'Secrets' (not 'Variables'), as a repository secret named exactly TYPO3_API_TOKEN."
            exit 1
          fi
          echo "TYPO3_API_TOKEN is present (length: ${#TYPO3_API_TOKEN})."

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: intl, mbstring, zip
          tools: composer:v2

      - name: Install tailor
        run: composer global require typo3/tailor

      - name: Publish ${{ steps.version.outputs.number }} to TER
        run: |
          export PATH="$(composer global config bin-dir --absolute):$PATH"
          tailor ter:publish --comment "Released by GitHub Actions" "${{ steps.version.outputs.number }}"
